# Sets environment:"local,dev,prod"
env: "dev"

# HTTP server settings
http_server:
  address: "localhost:4000"
  timeout: 4s
  idle_timeout: 60s

# Database connection settings
postgres:
  host: "localhost"
  port: "5432"
  # Should be from env DB_PASSWORD
  password: ""
  user: "skrepka_user"
  db_name: "skrepka_db"
  sslmode: "disable"

# Authentication settings
auth:
  # Should be from env JWT_SECRET
  jwt_secret: ""
  token_ttl: 1h
  # Should be from env GOOGLE_CLIENT_ID
  google_client_id: ""

